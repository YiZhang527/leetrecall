<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LeetRecall</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Space+Grotesk:wght@400;500;600&display=swap');

  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --border: #30363d;
    --text: #e6edf3;
    --muted: #8b949e;
    --accent: #00d4aa;
    --accent-dim: rgba(0,212,170,0.1);
    --easy: #3fb950;
    --medium: #d29922;
    --hard: #f85149;
    --overdue: #ff6b6b;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    width: 340px;
    min-height: 200px;
    max-height: 580px;
    background: var(--bg);
    color: var(--text);
    font-family: 'Space Grotesk', sans-serif;
    font-size: 13px;
    overflow: hidden;
  }

  /* Header */
  .header {
    padding: 14px 16px 10px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .logo {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .logo-icon {
    width: 24px; height: 24px;
    background: var(--accent);
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px;
  }
  .logo-text {
    font-family: 'JetBrains Mono', monospace;
    font-weight: 700;
    font-size: 14px;
    color: var(--text);
    letter-spacing: -0.02em;
  }
  .logo-text span { color: var(--accent); }

  .header-actions { display: flex; gap: 6px; align-items: center; }
  .icon-btn {
    background: none; border: 1px solid var(--border);
    color: var(--muted); cursor: pointer;
    width: 28px; height: 28px; border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; transition: all 0.15s;
  }
  .icon-btn:hover { border-color: var(--accent); color: var(--accent); }
  .icon-btn.syncing { animation: spin 1s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Stats bar */
  .stats-bar {
    display: flex;
    padding: 10px 16px;
    gap: 0;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
  }
  .stat {
    flex: 1;
    text-align: center;
    padding: 0 8px;
    border-right: 1px solid var(--border);
  }
  .stat:last-child { border-right: none; }
  .stat-num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 18px; font-weight: 700;
    line-height: 1.2;
  }
  .stat-num.accent { color: var(--accent); }
  .stat-num.overdue { color: var(--overdue); }
  .stat-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; margin-top: 1px; }

  /* Section header */
  .section-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 16px 6px;
  }
  .section-title {
    font-size: 11px; font-weight: 600; text-transform: uppercase;
    letter-spacing: 0.1em; color: var(--muted);
  }
  .limit-control {
    display: flex; align-items: center; gap: 6px;
  }
  .limit-label { font-size: 11px; color: var(--muted); }
  .limit-input {
    width: 38px; background: var(--surface); border: 1px solid var(--border);
    color: var(--text); border-radius: 4px; padding: 2px 4px;
    font-family: 'JetBrains Mono', monospace; font-size: 12px;
    text-align: center;
  }
  .limit-input:focus { outline: none; border-color: var(--accent); }

  /* Problem list */
  .list {
    overflow-y: auto;
    max-height: 380px;
    padding: 0 10px 10px;
  }
  .list::-webkit-scrollbar { width: 4px; }
  .list::-webkit-scrollbar-track { background: transparent; }
  .list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .problem-row {
    display: flex; align-items: center; gap: 10px;
    padding: 9px 8px;
    border-radius: 7px;
    cursor: pointer;
    transition: background 0.1s;
    text-decoration: none;
    color: inherit;
    margin-bottom: 2px;
  }
  .problem-row:hover { background: var(--surface); }

  .problem-num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; color: var(--muted);
    min-width: 32px; text-align: right;
  }
  .problem-title {
    flex: 1; font-size: 13px; font-weight: 500;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .problem-title.overdue { color: var(--overdue); }

  .diff-badge {
    font-size: 10px; font-weight: 600; padding: 2px 6px;
    border-radius: 4px; flex-shrink: 0;
  }
  .diff-easy { color: var(--easy); background: rgba(63,185,80,0.1); }
  .diff-medium { color: var(--medium); background: rgba(210,153,34,0.1); }
  .diff-hard { color: var(--hard); background: rgba(248,81,73,0.1); }

  .due-label {
    font-size: 10px; font-family: 'JetBrains Mono', monospace;
    min-width: 34px; text-align: right; flex-shrink: 0;
  }
  .due-overdue { color: var(--overdue); }
  .due-today { color: var(--accent); }

  /* Empty / loading states */
  .empty {
    text-align: center; padding: 40px 20px;
    color: var(--muted);
  }
  .empty-icon { font-size: 32px; margin-bottom: 10px; }
  .empty-title { font-size: 14px; font-weight: 600; color: var(--text); margin-bottom: 6px; }
  .empty-text { font-size: 12px; line-height: 1.5; }

  .sync-btn {
    display: block; width: calc(100% - 32px); margin: 10px 16px;
    background: var(--accent); color: #000;
    border: none; border-radius: 8px; padding: 10px;
    font-family: 'Space Grotesk', sans-serif; font-size: 13px; font-weight: 600;
    cursor: pointer; transition: opacity 0.15s;
  }
  .sync-btn:hover { opacity: 0.85; }

  /* Footer */
  .footer {
    padding: 8px 16px;
    border-top: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
  }
  .footer-text { font-size: 11px; color: var(--muted); }
  .footer-link { color: var(--accent); text-decoration: none; font-size: 11px; }
  .footer-link:hover { text-decoration: underline; }

  .problem-row.done {
    pointer-events: none;
    opacity: 0.5;
    transition: opacity 0.3s;
  }
  .problem-row.done .problem-title {
    text-decoration: line-through;
    color: var(--muted);
  }
  .done-check {
    color: var(--accent);
    font-size: 12px;
    font-weight: 700;
    flex-shrink: 0;
  }
  @keyframes fadeOut {
    0% { opacity: 0.5; max-height: 48px; }
    100% { opacity: 0; max-height: 0; padding: 0; margin: 0; }
  }
  .problem-row.removing {
    animation: fadeOut 0.4s ease forwards;
    overflow: hidden;
  }

  .problem-row.done { pointer-events: none; }
  .problem-row.done .problem-title { text-decoration: line-through; color: var(--muted); }
  .problem-row.done .diff-badge { opacity: 0.4; }
  .problem-row.done .due-label::before { content: "✓ "; }
  .problem-row.done .due-label { color: var(--accent); }

</style>
</head>
<body>

<div class="header">
  <div class="logo">
    <div class="logo-icon">⚡</div>
    <div class="logo-text">Leet<span>Recall</span></div>
  </div>

</div>

<div class="stats-bar">
  <div class="stat">
    <div class="stat-num accent" id="stat-due">–</div>
    <div class="stat-label">Due</div>
  </div>
  <div class="stat">
    <div class="stat-num overdue" id="stat-overdue">–</div>
    <div class="stat-label">Overdue</div>
  </div>
  <div class="stat">
    <div class="stat-num" id="stat-total">–</div>
    <div class="stat-label">Tracked</div>
  </div>
</div>

<div class="section-header">
  <span class="section-title">Today's Review</span>
  <div class="limit-control">
    <span class="limit-label">Daily limit</span>
    <input class="limit-input" type="number" id="daily-limit" min="1" max="50" value="10">
  </div>
</div>

<div class="list" id="problem-list">
  <div class="empty">
    <div class="empty-icon">🔄</div>
    <div class="empty-title">Loading...</div>
  </div>
</div>

<div class="footer">
  <span class="footer-text" id="last-sync">Never synced</span>
  <a class="footer-link" href="https://leetcode.com/progress/" target="_blank">Progress →</a>
</div>

<script src="popup.js"></script>
</body>
</html>
